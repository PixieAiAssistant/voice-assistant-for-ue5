name: Deploy site to GitHub Pages

# Публикует содержимое папки site/ на GitHub Pages при каждом пуше в main.
#
# ВАЖНО (сделать один раз вручную, иначе будет 404 "Site not found"):
#   Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
# Без этого шага сайт не будет обслуживаться, даже если этот workflow
# успешно отработает.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
