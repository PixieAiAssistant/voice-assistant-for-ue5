name: Build Pixie.exe (Nuitka)

# Собирает main.py в один .exe через Nuitka на Windows-раннере GitHub Actions.
# Локальная сборка через Nuitka требует правильной версии Python + компилятор
# C/C++ + все зависимости (PyAudio/mss/Pillow и т.д.) — CI даёт воспроизводимую
# и предсказуемую среду сборки без необходимости настраивать это на машине
# разработчика.
#
# Запуск:
#   - автоматически при пуше тега вида v1.0.0 → создаёт GitHub Release
#     с приложенным Pixie.exe
#   - вручную через "Run workflow" (workflow_dispatch) → просто собирает
#     артефакт (без релиза), доступен на вкладке Actions → Artifacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Build with Nuitka (--onefile)
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --windows-console-mode=disable `
            --windows-icon-from-ico=icon.ico `
            --enable-plugin=anti-bloat `
            --assume-yes-for-downloads `
            --output-dir=dist `
            --output-filename=Pixie.exe `
            main.py

      - name: Verify build output
        run: |
          if (!(Test-Path "dist\Pixie.exe")) {
            Write-Error "Pixie.exe was not produced by Nuitka build"
            exit 1
          }
          Get-Item "dist\Pixie.exe" | Select-Object Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pixie-exe
          path: agent/dist/Pixie.exe
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: agent/dist/Pixie.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
