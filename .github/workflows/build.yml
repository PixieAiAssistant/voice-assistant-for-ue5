name: Build Pixie Installer (PyInstaller + Inno Setup)

# Собирает main.py в portable-папку через PyInstaller (--onedir), затем упаковывает
# её в один Windows-установщик (PixieSetup.exe) через Inno Setup, и прикрепляет
# его к GitHub Release. Именно этот .exe пользователь скачивает с сайта одной кнопкой.
#
# Почему --onedir + Inno Setup, а не --onefile или Nuitka:
#   - Nuitka: провалился на google.genai._gaos (см. историю в installer/installer.iss
#     и коммиты репозитория) — компилятору C не хватало RAM/статический анализ
#     не видел динамические импорты пакета Agent Builder SDK.
#   - PyInstaller --onefile: единый самораспаковывающийся exe гораздо чаще ложно
#     детектится антивирусами/SmartScreen как троян (распаковывает себя во временную
#     папку при каждом запуске) — --onedir с обычным exe рядом с DLL почти никогда.
#   - Голый --onedir как .zip неудобен для конечного пользователя (нет ярлыков,
#     нет протокола pixie://, нужно руками распаковывать) — поэтому оборачиваем
#     его в installer/installer.iss (Inno Setup), который даёт привычный UX
#     "Далее → Далее → Готово" + ярлыки + регистрацию pixie:// для активации лицензии.
#
# Запуск:
#   - автоматически при пуше тега вида v1.0.0 → создаёт GitHub Release
#     с приложенными PixieSetup.exe (фиксированное имя, для прямой ссылки
#     .../releases/latest/download/PixieSetup.exe) и Pixie-vX.Y.Z-win64.zip (portable)
#   - вручную через "Run workflow" (workflow_dispatch) → просто собирает
#     артефакты (без релиза), доступны на вкладке Actions → Artifacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(\d+\.\d+\.\d+)$') {
            $version = $Matches[1]
          } else {
            $version = "0.0.0-dev"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved version: $version"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller (--onedir)
        run: |
          pyinstaller --noconfirm `
            --onedir `
            --windowed `
            --name Pixie `
            --collect-all google.genai `
            --collect-all customtkinter `
            --hidden-import=onboarding `
            --hidden-import=app_shell `
            --hidden-import=ui_theme `
            --hidden-import=presets `
            --hidden-import=config_loader `
            --hidden-import=licensing `
            --hidden-import=ue_tools `
            --hidden-import=ue_bridge `
            --hidden-import=ue58_core `
            --hidden-import=ue_script_library `
            --hidden-import=remote_execution `
            --icon=icon.ico `
            main.py

      - name: Verify PyInstaller build output
        run: |
          if (!(Test-Path "dist\Pixie\Pixie.exe")) {
            Write-Error "Pixie.exe was not produced by PyInstaller build"
            exit 1
          }
          Get-Item "dist\Pixie\Pixie.exe" | Select-Object Name, Length

      - name: Package portable build into .zip archive
        run: |
          Compress-Archive -Path "dist\Pixie\*" -DestinationPath "dist\Pixie-v${{ steps.ver.outputs.version }}-win64.zip" -Force

      - name: Build Windows installer with Inno Setup
        shell: pwsh
        run: |
          # windows-latest уже включает Inno Setup 6 (ISCC.exe) в составе образа.
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            throw "ISCC.exe not found at expected path: $iscc"
          }
          & $iscc /DMyAppVersion="${{ steps.ver.outputs.version }}" "..\installer\installer.iss"

      - name: Verify installer output
        run: |
          if (!(Test-Path "..\installer\output\PixieSetup.exe")) {
            Write-Error "PixieSetup.exe was not produced by Inno Setup build"
            exit 1
          }
          Get-Item "..\installer\output\PixieSetup.exe" | Select-Object Name, Length

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Pixie-v${{ steps.ver.outputs.version }}-win64
          path: |
            installer/output/PixieSetup.exe
            agent/dist/Pixie-v${{ steps.ver.outputs.version }}-win64.zip
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/output/PixieSetup.exe
            agent/dist/Pixie-v${{ steps.ver.outputs.version }}-win64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
